<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="50%" stop-color="#12122A"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="logo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#FF2D95"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#00F0FF" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#00F0FF" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#00F0FF" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#00F0FF" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#00F0FF" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#00F0FF" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#00F0FF" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#00F0FF" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#00F0FF" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#00F0FF" stroke-width="0.5"/>
  </g>

  <!-- Logo circle -->
  <circle cx="600" cy="280" r="80" fill="url(#logo)" opacity="0.15"/>
  <rect x="548" y="228" width="104" height="104" rx="20" fill="url(#logo)"/>
  <text x="600" y="310" font-family="system-ui, sans-serif" font-size="64" font-weight="bold" fill="#0A0A0F" text-anchor="middle">V</text>

  <!-- Title -->
  <text x="600" y="420" font-family="system-ui, sans-serif" font-size="56" font-weight="bold" fill="#E8E8F0" text-anchor="middle">VibeHub</text>

  <!-- Subtitle -->
  <text x="600" y="470" font-family="system-ui, sans-serif" font-size="24" fill="#8888AA" text-anchor="middle">
    Share Your Vibecoded Creations
  </text>

  <!-- Decorations -->
  <text x="200" y="550" font-family="monospace" font-size="14" fill="#00F0FF" opacity="0.6">~/feed</text>
  <text x="530" y="550" font-family="monospace" font-size="14" fill="#FF2D95" opacity="0.6">~/news</text>
  <text x="850" y="550" font-family="monospace" font-size="14" fill="#39FF14" opacity="0.6">~/create</text>
</svg>
