<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0A0A0F" />
  <title>VibeHub</title>
  <script>
    // GitHub Pages SPA redirect: capture the path and send to index.html
    sessionStorage.redirect = location.pathname.replace('/vibehub', '') + location.search + location.hash;
  </script>
  <meta http-equiv="refresh" content="0;URL='/vibehub/'" />
</head>
<body>
  <p>Redirecting to VibeHub…</p>
</body>
</html>
